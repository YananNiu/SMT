# SMT (Sky-image Multimodal Transformer) -- the flagship image + time-series model.
# One transformer fuses image patch tokens and time-series tokens via a [CLS] head.
model_skeleton: vit_model_img_ts
image_token: true
ts_token: true

# --- data (toy ANT slice shipped in data/toy) ---
data_root: data/toy
site: ANT
latitude: 46.630858    # ANT site; used to compute the GHI index if the csv lacks clear-sky columns
longitude: 8.580525
target: ghi_index    # predict the clear-sky index (GHI_percent_wrt_max)
horizon: 12          # 2 h ahead
window: 144          # 24 h look-back
indices: ['2023-06-02 00:00', '2023-06-02 23:59']   # test period

# --- transformer ---
patch_mode: square   # square | row | column  (see configs/ablation/)
embed_dim: 192
depth_transformer: 3
num_heads: 6
drop_rate: 0.0
attn_drop: 0.1

# --- training ---
epochs_max: 30
batch_size: 16
patience: 5
lr: 5.0e-4
warmup_epochs: 3
seed: 0
